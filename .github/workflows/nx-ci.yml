# NX-Enabled CI Workflow
# Uses NX for build orchestration, caching, and affected project detection

name: NX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  # Main CI job using NX
  ci:
    name: NX CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup NX
        uses: nrwl/nx-set-up@v1
        with:
          nx-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Show affected projects
        run: nx show projects --affected --files=${{ github.event.inputs.files }}

      - name: Type check affected
        run: nx affected --target=typecheck --parallel=3

      - name: Test affected
        run: nx affected --target=test --parallel=3

      - name: Lint affected
        run: nx affected --target=lint --parallel=3

      - name: Build affected
        run: nx affected --target=build --parallel=3

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nx-affected-dist
          path: apps/*/dist
          retention-days: 7

  # Docker build for affected apps only
  docker-build:
    name: Docker Build Affected
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup NX
        uses: nrwl/nx-set-up@v1
        with:
          nx-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build affected apps
        run: nx affected --target=build --parallel=3

      - name: Get affected apps list
        id: affected-apps
        run: |
          APPS=$(nx show projects --affected --with-target docker:build --plain 2>/dev/null | tr '\n' ' ' || echo "")
          echo "apps=$APPS" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up QEMU
        if: steps.affected-apps.outputs.apps != ''
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.affected-apps.outputs.apps != ''
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.affected-apps.outputs.apps != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker for affected apps
        if: steps.affected-apps.outputs.apps != ''
        run: |
          for app in ${{ steps.affected-apps.outputs.apps }}; do
            echo "Building Docker for $app"
            docker build -t "$app" -f "apps/$app/Dockerfile" "apps/$app"
            docker tag "$app" "ghcr.io/${{ github.repository }}/$app:${{ github.sha }}"
            docker push "ghcr.io/${{ github.repository }}/$app:${{ github.sha }}"
          done

# Workflow to visualize the project graph
  graph:
    name: Generate Project Graph
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NX
        uses: nrwl/nx-set-up@v1
        with:
          nx-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate project graph
        run: nx graph --file=project-graph.json
        continue-on-error: true

      - name: Upload project graph
        uses: actions/upload-artifact@v4
        with:
          name: project-graph
          path: project-graph.json
          retention-days: 7
