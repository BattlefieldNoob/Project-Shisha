name: Build and Push Fuel Advisor Bot

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/fuel-advisor-bot/**'
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/app-ci.yml
    permissions:
      contents: read
      packages: write
    with:
      app-name: fuel-advisor-bot