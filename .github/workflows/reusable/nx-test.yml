# Reusable workflow to run tests with NX caching
name: NX Test

on:
  workflow_call:
    inputs:
      app-name:
        description: Application folder under apps/
        required: true
        type: string
      runner:
        description: Runner to use
        required: false
        type: string
        default: ubuntu-latest

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  test:
    name: Test ${{ inputs.app-name }}
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with NX cache
        run: npx nx test ${{ inputs.app-name }}

      - name: Restore NX cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ inputs.app-name }}-${{ github.sha }}
          restore-keys: |
            nx-${{ inputs.app-name }}-