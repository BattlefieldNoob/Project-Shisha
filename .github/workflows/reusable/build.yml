# Reusable workflow to build a Bun application
name: Build Application

on:
  workflow_call:
    inputs:
      app-name:
        description: Application folder under apps/
        required: true
        type: string
      runner:
        description: Runner to use
        required: false
        type: string
        default: ubuntu-latest

outputs:
  artifact-name:
    description: Name of the built artifact
    value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build ${{ inputs.app-name }}
    runs-on: ${{ inputs.runner }}
    outputs:
      artifact-name: ${{ steps.artifact.outputs.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get bun cache key
        id: cache-key
        run: |
          echo "hash=${{ hashFiles('apps/${{ inputs.app-name }}/package.json', 'apps/${{ inputs.app-name }}/bun.lockb') }}" >> $GITHUB_OUTPUT

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: apps/${{ inputs.app-name }}/node_modules
          key: bun-modules-${{ inputs.app-name }}-${{ steps.cache-key.outputs.hash }}
          restore-keys: |
            bun-modules-${{ inputs.app-name }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/${{ inputs.app-name }}

      - name: Build application
        run: bun run build
        working-directory: apps/${{ inputs.app-name }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app-name }}-dist
          path: apps/${{ inputs.app-name }}/dist
          retention-days: 1

      - name: Set output
        id: artifact
        run: echo "name=${{ inputs.app-name }}-dist" >> $GITHUB_OUTPUT