# Reusable workflow to build and push Docker images
name: Build and Push Docker

on:
  workflow_call:
    inputs:
      app-name:
        description: Application folder under apps/
        required: true
        type: string
      registry:
        description: Container registry
        required: false
        type: string
        default: ghcr.io
      image-base:
        description: Image base name
        required: false
        type: string
        default: battlefieldnoob/project-shisha
      platforms:
        description: Comma-separated list of platforms
        required: false
        type: string
        default: linux/amd64,linux/arm64
      dockerfile:
        description: Path to Dockerfile
        required: false
        type: string
        default: apps/${{ inputs.app-name }}/Dockerfile
      context:
        description: Build context
        required: false
        type: string
        default: apps/${{ inputs.app-name }}
      semver:
        description: Semantic version for tagging
        required: false
        type: string
        default: ''
      runner:
        description: Runner to use
        required: false
        type: string
        default: ubuntu-latest

    secrets:
      registry-password:
        description: Password for container registry
        required: false

env:
  REGISTRY: ${{ inputs.registry }}
  IMAGE_BASE: ${{ inputs.image-base }}
  IMAGE_NAME: ${{ inputs.app-name }}

jobs:
  docker-build:
    name: Build Docker ${{ inputs.app-name }}
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: inputs.registry == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: inputs.registry != 'ghcr.io' && inputs.registry-password != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ inputs.registry-password }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{ branch }}-

      - name: Add semantic version tag
        if: inputs.semver != ''
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          TAGS="$TAGS,${{ inputs.registry }}/${{ inputs.image-base }}/${{ inputs.image-name }}:${{ inputs.semver }}"
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
        id: semver-tag
        name: Add semver tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          cache-from: type=gha
          cache-to: type=gha,mode=max