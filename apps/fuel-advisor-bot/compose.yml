---
version: '3.8'

services:
  fuel-advisor-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fuel-advisor-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
    networks:
      - app-network

networks:
  app-network:
    external: true
    retries: 3