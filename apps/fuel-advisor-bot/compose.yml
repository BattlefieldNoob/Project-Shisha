---
# Fuel Advisor Bot Docker Compose
# Standardized according to bun-monorepo-blueprint.md

services:
  fuel-advisor-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fuel-advisor-bot
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.project-shisha.app: "fuel-advisor-bot"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "pgrep", "-x", "node"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  app-network:
    name: app-network
    driver: bridge