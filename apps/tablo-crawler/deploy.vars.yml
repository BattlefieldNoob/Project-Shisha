---
# Tablo Crawler deployment variables
# Following blueprint conventions from bun-monorepo-blueprint.md

app_name: tablo-crawler
container_name: tablo-crawler
image_repository: ghcr.io/battlefieldnoob/tablo-crawler
image_tag: latest
app_port: 3000
host_port: 3000
watchtower_enabled: true
restart_policy: unless-stopped
env_file_name: tablo-crawler.env
compose_project_name: tablo-crawler
dockerfile_strategy: safe

# Pre-deployment checks
pre_deploy_checks: true
min_disk_space_gb: 1
min_memory_mb: 256

# Rolling update settings
rolling_update_enabled: false
rolling_update_delay: 10
health_check_retries: 5
health_check_delay: 10

# Rollback settings
rollback_enabled: true
backup_before_deploy: true

# Template settings
template_validate: true
